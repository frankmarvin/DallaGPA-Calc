version: '3.8'
services:
  db:
    image: postgres:15
    container_name: dallagpa_db
    environment:
      POSTGRES_USER: dallagpa
      POSTGRES_PASSWORD: dallagpa
      POSTGRES_DB: dallagpa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: dallagpa_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://dallagpa:dallagpa@db:5432/dallagpa
      JWT_SECRET: secret
      JWT_REFRESH_SECRET: refresh_secret
      FRONTEND_URL: http://localhost:5173
      PORT: 5000
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: dallagpa_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
