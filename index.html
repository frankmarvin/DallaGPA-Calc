.circle:nth-child(2){

<script>

const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");

const togglePassword =
document.getElementById("togglePassword");

const toggleConfirmPassword =
document.getElementById("toggleConfirmPassword");

togglePassword.onclick = () =>{

password.type =
password.type==="password"
?
"text"
:
"password";

togglePassword.innerHTML =
password.type==="password"
?
"👁"
:
"🙈";

}

toggleConfirmPassword.onclick = ()=>{

confirmPassword.type =
confirmPassword.type==="password"
?
"text"
:
"password";

toggleConfirmPassword.innerHTML =
confirmPassword.type==="password"
?
"👁"
:
"🙈";

}


const strengthBar =
document.getElementById("strengthBar");

const strengthText =
document.getElementById("strengthText");

password.addEventListener("input",()=>{

const value=password.value;

let strength=0;

if(value.length>=8)
strength+=25;

if(/[A-Z]/.test(value))
strength+=25;

if(/[0-9]/.test(value))
strength+=25;

if(/[!@#$%^&*]/.test(value))
strength+=25;

strengthBar.style.width=strength+"%";

if(strength<=25){

strengthBar.className=
"h-full rounded-full bg-red-500 transition-all duration-500";

strengthText.innerHTML=
"Weak Password";

}

else if(strength<=50){

strengthBar.className=
"h-full rounded-full bg-yellow-500 transition-all duration-500";

strengthText.innerHTML=
"Fair Password";

}

else if(strength<=75){

strengthBar.className=
"h-full rounded-full bg-blue-500 transition-all duration-500";

strengthText.innerHTML=
"Good Password";

}

else{

strengthBar.className=
"h-full rounded-full bg-green-500 transition-all duration-500";

strengthText.innerHTML=
"Strong Password";

}

});


document
.getElementById("registerForm")
.addEventListener("submit",(e)=>{

e.preventDefault();

const fullname =
document.getElementById("fullname").value.trim();

const email =
document.getElementById("email").value.trim();

const university =
document.getElementById("university").value;

const regno =
document.getElementById("regno").value.trim();

const studentid =
document.getElementById("studentid").value.trim();

const phone =
document.getElementById("phone").value.trim();

const pass =
password.value;

const confirm =
confirmPassword.value;

const terms =
document.getElementById("terms").checked;

if(
fullname==="" ||

email==="" ||

regno==="" ||

studentid==="" ||

phone===""

){

alert("Please fill in all required fields.");

return;

}

if(university==="Select University"){

alert("Please select your university.");

return;

}

if(pass.length<8){

alert("Password must contain at least 8 characters.");

return;

}

if(pass!==confirm){

alert("Passwords do not match.");

return;

}

if(!terms){

alert("Please accept the Terms and Conditions.");

return;

}

const user={

fullname,

email,

university,

regno,

studentid,

phone,

password:pass

};

localStorage.setItem(

"dallagpaUser",

JSON.stringify(user)

);


alert(

"Registration Successful!\n\nRedirecting to Login Page..."

);


window.location.href="login.html";

});


if(

window.matchMedia(

"(prefers-color-scheme:dark)"

).matches

){

document.documentElement.classList.add("dark");

}
